name: SSH tunnel over OutRay
description: Establishes an OutRay tunnel to the GitHub Action runner for debugging

branding:
  icon: minimize-2
  color: purple

inputs:
  timeout:
    description: Tunnel timeout
    required: true
    default: 1h
  port:
    description: Local port to forward to
    required: true
    default: 22
  ssh_public_key:
    description: Your SSH public key
    required: true
  outray_api_key:
    description: Your OutRay API key (from dashboard settings)
    required: true

runs:
  using: composite
  steps:
    - name: Download OutRay
      run: |
        curl -L -o outray.tar.gz https://github.com/outray-tunnel/outray/releases/latest/download/outray-linux-x64.tar.gz
        tar xfz outray.tar.gz
        chmod +x outray
      shell: bash
    - name: Add ~/.ssh directory
      run: mkdir -p ~/.ssh
      shell: bash
    - name: Add SSH public key to authorized_keys
      run: echo "${{ inputs.ssh_public_key }}" >> ~/.ssh/authorized_keys
      shell: bash
    - name: Fix home directory permissions
      run: chmod 755 ~
      shell: bash
    - run: chmod 600 ~/.ssh/authorized_keys
      shell: bash
    - name: Debug message
      run: echo "Starting OutRay tunnel..."
      shell: bash
    - name: Setup OutRay TCP tunnel
      run: timeout ${{ inputs.timeout }} ./outray tcp ${{ inputs.port }} --key ${{ inputs.outray_api_key }} &
      shell: bash
    - name: Debug message
      run: echo "Tunnel started. Check OutRay dashboard for public URL."
      shell: bash
