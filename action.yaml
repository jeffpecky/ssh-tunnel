name: SSH tunnel over OutRay
description: Establishes an OutRay TCP tunnel to the GitHub Action runner for SSH debugging

branding:
  icon: minimize-2
  color: purple

inputs:
  timeout:
    description: Tunnel timeout
    required: true
    default: 1h
  port:
    description: Local SSH port to forward
    required: true
    default: 22
  ssh_public_key:
    description: Your SSH public key
    required: true
  outray_api_key:
    description: Your OutRay API key
    required: true

outputs:
  public-url:
    description: OutRay TCP tunnel endpoint (e.g. tcp://o1.outray.app:20123)

runs:
  using: composite
  steps:
    - name: Add SSH public key
      run: mkdir -p ~/.ssh && echo "${{ inputs.ssh_public_key }}" >> ~/.ssh/authorized_keys
      shell: bash
    - name: Fix permissions
      run: chmod 755 ~ && chmod 600 ~/.ssh/authorized_keys
      shell: bash
    - name: Start SSH
      run: sudo service ssh start && sleep 2
      shell: bash
    - name: Install OutRay
      run: npm install -g outray
      shell: bash
    - name: Patch OutRay --key bug
      run: |
        IDX=$(npm root -g)/outray/dist/index.js
        if grep -q 'if (!config) {' "$IDX" && grep -q 'const keyValue = getFlagValue' "$IDX"; then
          sed -i 's/let config = configManager.load();/const __keyOverride = getFlagValue(remainingArgs, "--key") || process.env.OUTRAY_API_KEY; let config = configManager.load();/' "$IDX"
          sed -i 's/if (!config) {$/if (!config \&\& !__keyOverride) {/' "$IDX"
          sed -i 's/const keyValue = getFlagValue(remainingArgs, "--key");/const keyValue = __keyOverride;/' "$IDX"
        fi
      shell: bash
    - name: Start OutRay tunnel
      run: outray tcp ${{ inputs.port }} --key ${{ inputs.outray_api_key }} > /tmp/outray.log 2>&1 &
      shell: bash
    - name: Wait for tunnel URL
      id: tunnel
      run: |
        echo "Waiting for OutRay tunnel to establish..."
        for i in $(seq 1 15); do
          URL=$(grep -oE 'tcp://[^ ]+' /tmp/outray.log 2>/dev/null | head -1)
          if [ -n "$URL" ]; then
            echo "Tunnel established: $URL"
            echo "public-url=$URL" >> $GITHUB_OUTPUT
            break
          fi
          sleep 1
        done
        if [ -z "$URL" ]; then
          echo "Warning: Could not detect tunnel URL. Log contents:"
          cat /tmp/outray.log
        fi
      shell: bash
    - name: Display connection info
      run: |
        URL=$(grep -oE 'tcp://[^ ]+' /tmp/outray.log 2>/dev/null | head -1)
        if [ -n "$URL" ]; then
          HOST=$(echo "$URL" | sed 's|tcp://||' | cut -d: -f1)
          PORT=$(echo "$URL" | sed 's|tcp://||' | cut -d: -f2)
          echo "========================================"
          echo "  SSH Tunnel Active!"
          echo "  Connect using: ssh -p $PORT runner@$HOST"
          echo "========================================"
        fi
      shell: bash
    - name: Keep runner alive
      run: sleep ${{ inputs.timeout }}
      shell: bash
