name: SSH tunnel via Tailscale
description: Connects a GitHub Action runner to your Tailnet for SSH debugging

branding:
  icon: minimize-2
  color: purple

inputs:
  timeout:
    description: How long to keep the runner alive
    required: true
    default: 6h
  ssh_public_key:
    description: Your SSH public key
    required: true
  ts_oauth_client_id:
    description: Tailscale OAuth client ID
    required: true
  ts_oauth_secret:
    description: Tailscale OAuth client secret
    required: true
  ts_tags:
    description: Tailscale tags for the CI node
    required: false
    default: tag:ci

outputs:
  tailscale-ip:
    description: Tailscale IPv4 address of the runner node

runs:
  using: composite
  steps:
    - name: Add SSH public key
      run: mkdir -p ~/.ssh && echo "${{ inputs.ssh_public_key }}" >> ~/.ssh/authorized_keys
      shell: bash
    - name: Fix permissions
      run: chmod 755 ~ && chmod 600 ~/.ssh/authorized_keys
      shell: bash
    - name: Start SSH
      run: sudo service ssh start && sleep 2
      shell: bash
    - name: Tailscale
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ inputs.ts_oauth_client_id }}
        oauth-secret: ${{ inputs.ts_oauth_secret }}
        tags: ${{ inputs.ts_tags }}
    - name: Get Tailscale IP
      id: tailscale
      run: |
        IP=$(tailscale ip -4)
        echo "Runner Tailscale IP: $IP"
        echo "tailscale-ip=$IP" >> $GITHUB_OUTPUT
      shell: bash
    - name: Display connection info
      run: |
        echo "========================================"
        echo "  SSH Tunnel Active!"
        echo "  Connect using: ssh runner@$(tailscale ip -4)"
        echo "========================================"
      shell: bash
    - name: Keep runner alive
      run: sleep ${{ inputs.timeout }}
      shell: bash
