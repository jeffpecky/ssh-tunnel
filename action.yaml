name: SSH tunnel over OutRay
description: Establishes an OutRay TCP tunnel to the GitHub Action runner for SSH debugging, with public URL output.

branding:
  icon: minimize-2
  color: purple

inputs:
  timeout:
    description: Tunnel timeout
    required: true
    default: 1h
  port:
    description: Local SSH port to forward
    required: true
    default: '22'
  ssh_public_key:
    description: Your SSH public key
    required: true
  outray_api_key:
    description: OutRay API key (from https://outray.dev/settings)
    required: true

outputs:
  public-url:
    description: OutRay public tunnel endpoint (e.g., tcp.outray.app:20123)
    value: ${{ steps.outray.outputs.public-url }}

runs:
  using: composite
  steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh_public_key }}" >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/authorized_keys
        sudo service ssh start
        sleep 2
      shell: bash

    - name: Install OutRay
      run: npm install -g outray
      shell: bash

    - name: Patch OutRay --key bug (if needed)
      run: |
        OUTRAY_INDEX=$(npm root -g)/outray/dist/index.js

        # Only patch if the bug exists: CLI bails on missing config before reading --key
        if grep -q 'if (!config) {' "$OUTRAY_INDEX" && \
           grep -q 'const keyValue = getFlagValue(remainingArgs, "--key");' "$OUTRAY_INDEX"; then
          echo "Outray --key bug detected, patching..."
          sed -i 's/let config = configManager.load();/const __keyOverride = getFlagValue(remainingArgs, "--key") || process.env.OUTRAY_API_KEY; let config = configManager.load();/' "$OUTRAY_INDEX"
          sed -i 's/if (!config) {$/if (!config \&\& !__keyOverride) {/' "$OUTRAY_INDEX"
          sed -i 's/const keyValue = getFlagValue(remainingArgs, "--key");/const keyValue = __keyOverride;/' "$OUTRAY_INDEX"
          echo "Patch applied."
        else
          echo "No patch needed, --key bug already fixed or code changed."
        fi
      shell: bash

    - name: Setup OutRay tunnel
      id: outray
      run: |
        # Start TCP tunnel for SSH in background
        timeout ${{ inputs.timeout }} outray tcp ${{ inputs.port }} --key "${{ inputs.outray_api_key }}" --no-logs > /tmp/outray.log 2>&1 &
        OUTRAY_PID=$!
        echo "outray-pid=$OUTRAY_PID" >> $GITHUB_OUTPUT
        sleep 8

        # Parse the tunnel endpoint from output
        cat /tmp/outray.log
        OUTRAY_URL=$(grep -oP 'tcp://\S+' /tmp/outray.log | head -1 || echo "")
        if [[ -z "$OUTRAY_URL" ]]; then
          # Try alternate output format
          OUTRAY_URL=$(grep -oP '(tcp\.outray\.\S+:\d+|\S+outray\S+:\d+)' /tmp/outray.log | head -1 || echo "")
        fi
        if [[ -n "$OUTRAY_URL" ]]; then
          echo "public-url=$OUTRAY_URL" >> $GITHUB_OUTPUT
          echo "✅ OutRay tunnel ready: $OUTRAY_URL"
        else
          echo "public-url=(tunnel active, check logs)" >> $GITHUB_OUTPUT
          echo "⚠️ Could not parse tunnel URL from logs"
        fi
      shell: bash
