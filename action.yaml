name: SSH tunnel over Serveo
description: Establishes a Serveo tunnel to the GitHub Action runner for debugging

branding:
  icon: minimize-2
  color: purple

inputs:
  timeout:
    description: Tunnel timeout
    required: true
    default: 1h
  port:
    description: Local port to forward to
    required: true
    default: 22
  ssh_public_key:
    description: Your SSH public key
    required: true

runs:
  using: composite
  steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh_public_key }}" >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/authorized_keys
        sudo service ssh start
        sleep 2
      shell: bash
    - name: Setup Serveo tunnel
      run: |
        ssh-keyscan serveo.net >> ~/.ssh/known_hosts
        timeout ${{ inputs.timeout }} ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 0:localhost:${{ inputs.port }} serveo.net 2>&1 | tee /tmp/serveo.log &
        sleep 10
        cat /tmp/serveo.log || echo "Waiting for tunnel..."
      shell: bash
