name: SSH Tunnel
on: push

jobs:
  deploy:
    name: Set up tunnel
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      
    - name: Setup tunnel
      uses: jeffpecky/ssh-tunnel@main
      with:
        timeout: 6h
        ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        ts_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}
